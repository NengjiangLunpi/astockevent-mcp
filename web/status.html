<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AStockEvent · 系统状态</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  :root { --pico-font-size: 93.75%; }
  body { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
  header { padding: 1.5rem 0 0.5rem; position: relative; }
  .theme-toggle { position: absolute; top: 1.5rem; right: 0; background: none; border: 1px solid var(--pico-muted-border-color); border-radius: 8px; padding: 0.3rem 0.5rem; cursor: pointer; font-size: 1.1rem; line-height: 1; }
  header h1 { font-size: 1.3rem; margin-bottom: 0.2rem; }
  header nav a { font-size: 0.8rem; margin-right: 1rem; }
  .card { margin-bottom: 1rem; }
  .card h3 { margin-bottom: 0.5rem; font-size: 0.95rem; }
  .ok { color: #27ae60; } .warn { color: #d35400; } .err { color: #c0392b; }
  table { font-size: 0.82rem; }
  .login-box { max-width: 320px; margin: 4rem auto; text-align: center; }
  footer { text-align: center; padding: 2rem 0; font-size: 0.75rem; color: var(--pico-muted-color); }
  .badge-sm { font-size: 0.7rem; padding: 0.08rem 0.4rem; border-radius: 3px; }
  .bg-ok { background: #d5f5e3; color: #1e8449; }
  .bg-err { background: #fadbd8; color: #922b21; }
</style>
</head>
<body>
<header>
  <button class="theme-toggle" id="themeToggle" title="切换深色模式" aria-label="切换深色模式">🌙</button>
  <h1>AStockEvent</h1>
  <nav><a href="/">看板</a><a href="/admin">管理</a><a href="/status">状态</a><a href="/report">报告</a><a href="/review">审核</a></nav>
</header>
<main id="main">
  <div class="loading">加载中...</div>
</main>
<footer>AStockEvent Admin · 仅限授权访问</footer>
<div id="loginForm" style="display:none">
  <div class="login-box">
    <h3>管理员登录</h3>
    <form id="authForm">
      <input type="text" id="username" placeholder="用户名" required>
      <input type="password" id="password" placeholder="密码" required>
      <button type="submit">登录</button>
    </form>
  </div>
</div>
<script>
var AUTH_KEY = 'dp_admin_auth';

function getAuth() {
  return sessionStorage.getItem(AUTH_KEY);
}

function setAuth(u, p) {
  sessionStorage.setItem(AUTH_KEY, 'Basic ' + btoa(u + ':' + p));
}

function apiFetch(url) {
  var headers = {};
  var auth = getAuth();
  if (auth) headers['Authorization'] = auth;
  return fetch(url, { headers: headers }).then(function(r) {
    if (r.status === 401) { sessionStorage.removeItem(AUTH_KEY); showLogin(); throw new Error('unauthorized'); }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function showLogin() {
  document.getElementById('main').innerHTML = '';
  document.getElementById('loginForm').style.display = 'block';
}

document.getElementById('authForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  setAuth(u, p);
  document.getElementById('loginForm').style.display = 'none';
  load();
});

var ICONS = { ok: '<span class="ok">正常</span>', warn: '<span class="warn">警告</span>', err: '<span class="err">错误</span>' };

function load() {
  var main = document.getElementById('main');
  main.innerHTML = '<div class="loading">加载中...</div>';

  apiFetch('/api/status').then(function(d) {
    var s = d.scheduler;
    var db = d.database;
    var pl = d.pipeline;

    var html = '<article class="card"><h3>调度器</h3><table><tbody>' +
      '<tr><td>状态</td><td>' + (s.running ? '<span class="badge-sm bg-ok">运行中</span>' : '<span class="badge-sm bg-err">已停止</span>') + '</td></tr>' +
      '<tr><td>启动时间</td><td>' + (s.started_at || '—') + '</td></tr>' +
      '<tr><td>运行时长</td><td>' + fmtDuration(s.uptime_seconds) + '</td></tr>' +
      '</tbody></table></article>';

    html += '<article class="card"><h3>数据库</h3><table><tbody>' +
      '<tr><td>连接</td><td>' + (db.connected ? '<span class="ok">已连接</span>' : '<span class="err">断开</span>') + '</td></tr>' +
      '<tr><td>Event 总数</td><td>' + db.event_count + '</td></tr>' +
      '</tbody></table></article>';

    // Archive progress
    var arch = d.archive || {};
    if (d.database.connected) {
      html += '<article class="card"><h3>Archive 回溯</h3><table><tbody>' +
        '<tr><td>公告总数</td><td>' + (arch.total_raw_announcements || 0) + '</td></tr>' +
        '<tr><td>已下载全文</td><td>' + (arch.with_full_text || 0) + '</td></tr>' +
        '<tr><td>待下载</td><td>' + (arch.pending_download || 0) + '</td></tr>' +
        '<tr><td>完成率</td><td>' + (arch.completion_pct || 0) + '%</td></tr>' +
        '<tr><td>最近运行</td><td>' + formatLastArchive(arch.last_run) + '</td></tr>' +
        '</tbody></table></article>';
    }

    html += '<article class="card"><h3>最近采集</h3><table><thead><tr><th>时间</th><th>状态</th><th>新公告</th><th>新事件</th><th>错误</th><th>耗时</th></tr></thead><tbody>';
    var cycles = pl.last_cycles || [];
    for (var i = 0; i < cycles.length; i++) {
      var c = cycles[i];
      var t = new Date(c.time).toLocaleTimeString('zh-CN', { hour12: false });
      var ok = c.status === 'ok';
      var st = c.stats || {};
      html += '<tr>' +
        '<td>' + t + '</td>' +
        '<td>' + (ok ? '<span class="badge-sm bg-ok">正常</span>' : '<span class="badge-sm bg-err">错误</span>') + '</td>' +
        '<td>' + (st.new_raw || 0) + '</td>' +
        '<td>' + (st.new_events || 0) + '</td>' +
        '<td>' + (st.errors || 0) + '</td>' +
        '<td>' + (c.duration_ms || '—') + 'ms</td>' +
        '</tr>';
    }
    html += '</tbody></table></article>';

    main.innerHTML = html;
  }).catch(function(err) {
    if (err.message === 'unauthorized') return;
    main.innerHTML = '<div class="error-msg">加载失败: ' + err.message + '</div>';
  });
}

function fmtDuration(s) {
  if (!s && s !== 0) return '—';
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function formatLastArchive(run) {
  if (!run) return '暂无';
  var t = new Date(run.time).toLocaleTimeString('zh-CN', { hour12: false });
  var s = run.stats || {};
  var parts = [t, s.succeeded + '/' + s.total_processed + ' 成功', run.duration_ms + 'ms'];
  return parts.join(' · ');
}

// init
if (!getAuth()) { showLogin(); } else { load(); }

/* ====== dark mode ====== */
(function() {
  var KEY = 'dp_theme';
  var html = document.documentElement;
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  var saved = localStorage.getItem(KEY);
  if (saved) {
    html.setAttribute('data-theme', saved);
    btn.textContent = saved === 'dark' ? '☀️' : '🌙';
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
  btn.addEventListener('click', function() {
    var cur = html.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(KEY, next);
  });
})();
</script>
</body>
</html>
