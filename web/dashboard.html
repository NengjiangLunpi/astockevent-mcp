<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AStockEvent — A股公告事件流</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  :root { --pico-font-size: 93.75%; }
  body { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
  header { padding: 1.5rem 0 0.5rem; position: relative; }
  header h1 { margin-bottom: 0.1rem; font-size: 1.4rem; }
  header p { color: var(--pico-muted-color); font-size: 0.85rem; margin-bottom: 1rem; }
  .theme-toggle { position: absolute; top: 1.5rem; right: 0; background: none; border: 1px solid var(--pico-muted-border-color); border-radius: 8px; padding: 0.3rem 0.5rem; cursor: pointer; font-size: 1.1rem; line-height: 1; }
  .filter-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .filter-bar button { font-size: 0.82rem; padding: 0.3rem 0.9rem; }
  .status-bar { display: flex; justify-content: space-between; align-items: center;
                font-size: 0.78rem; color: var(--pico-muted-color);
                padding: 0.4rem 0; border-bottom: 1px solid var(--pico-muted-border-color);
                margin-bottom: 0.8rem; gap: 0.5rem; flex-wrap: wrap; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 0.3rem; }
  .dot.on { background: #27ae60; } .dot.off { background: #e74c3c; }
  .event-card { padding: 0.85rem 0; border-bottom: 1px solid var(--pico-muted-border-color); }
  .event-card:last-child { border-bottom: none; }
  .event-header { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
  .event-stock { font-weight: 700; font-size: 0.92rem; white-space: nowrap; }
  .event-stock .code { color: var(--pico-muted-color); font-weight: 400; margin-left: 0.25rem; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.5rem;
           border-radius: 4px; font-weight: 600; white-space: nowrap; }
  .badge-type { border: 1px solid; }
  .type-reduction { color: #c0392b; border-color: #c0392b; }
  .type-delisting { color: #8e1a1a; border-color: #8e1a1a; }
  .type-regulatory { color: #d35400; border-color: #d35400; }
  .type-lockup { color: #2471a3; border-color: #2471a3; }
  .type-buyback { color: #1e8449; border-color: #1e8449; }
  .conf-verified { background: #d5f5e3; color: #1e8449; }
  .conf-likely { background: #fef9e7; color: #b7950b; }
  .conf-uncertain { background: #fadbd8; color: #922b21; }
  .event-summary { font-size: 0.9rem; line-height: 1.45; margin-bottom: 0.25rem; }
  .event-meta { font-size: 0.75rem; color: var(--pico-muted-color); display: flex; gap: 1rem; flex-wrap: wrap; }
  .loading, .empty, .error-msg { text-align: center; padding: 3rem 1rem; color: var(--pico-muted-color); }
  .error-msg { color: #c0392b; }
  footer { text-align: center; padding: 2rem 0; font-size: 0.75rem; color: var(--pico-muted-color); }
  @media (max-width: 600px) {
    header h1 { font-size: 1.2rem; }
    .event-meta { gap: 0.5rem; }
    .filter-bar button { font-size: 0.75rem; padding: 0.2rem 0.6rem; }
  }
</style>
</head>
<body>
<header>
  <button class="theme-toggle" id="themeToggle" title="切换深色模式" aria-label="切换深色模式">🌙</button>
  <h1>AStockEvent</h1>
  <p>A股公告事件流 — 结构化语义事件，实时监控</p>
</header>
<div class="filter-bar" id="filterBar">
  <button data-type="">全部</button>
  <button class="outline type-reduction" data-type="share_reduction">减持</button>
  <button class="outline type-delisting" data-type="delisting_risk">ST/退市</button>
  <button class="outline type-regulatory" data-type="regulatory_letter">监管函件</button>
  <button class="outline type-lockup" data-type="lockup_expiration">解禁</button>
  <button class="outline type-buyback" data-type="share_buyback">回购</button>
</div>
<div class="status-bar">
  <span><span class="dot on" id="statusDot"></span><span id="statusText">就绪</span></span>
  <span id="refreshInfo">—</span>
</div>
<main id="eventList">
  <div class="loading">加载中...</div>
</main>
<footer>AStockEvent v0.1 · A股公告结构化事件流 · 数据来源：巨潮资讯 · <a href="/admin">管理后台</a></footer>
<script>
var API = '/v1/events';
var REFRESH_MS = 5 * 60 * 1000;
var DEBOUNCE_MS = 30 * 1000;
var TYPE_NAMES = {
  share_reduction: '减持', delisting_risk: 'ST/退市', regulatory_letter: '监管函',
  lockup_expiration: '解禁', share_buyback: '回购'
};
var TYPE_CSS = {
  share_reduction: 'type-reduction', delisting_risk: 'type-delisting',
  regulatory_letter: 'type-regulatory', lockup_expiration: 'type-lockup',
  share_buyback: 'type-buyback'
};
var CONF_NAMES = { verified: '已核实', likely: '未核实', uncertain: '不确定' };
var CONF_CSS = { verified: 'conf-verified', likely: 'conf-likely', uncertain: 'conf-uncertain' };
var PHASE_NAMES = {
  plan: '计划中', in_progress: '进行中', completed: '已完成', terminated: '已终止',
  warning: '预警中', confirmed: '已确认', delisting_period: '退市整理期',
  remediation: '整改中', approaching: '即将到期', expired: '已到期',
  expiring_soon: '即将到期', pending_reply: '待回复', replied: '已回复', overdue: '逾期未回'
};
var currentType = '';
var lastFetchTime = null;
var cachedEvents = null;
var autoTimer = null;

function esc(s) {
  if (!s) return '';
  var div = document.createElement('div');
  div.textContent = String(s);
  return div.innerHTML;
}

/* ====== anti-spam: debounce via sessionStorage ====== */
function canFetch() {
  var key = 'dp_last_fetch_' + (currentType || 'all');
  var prev = sessionStorage.getItem(key);
  if (!prev) return true;
  var elapsed = Date.now() - parseInt(prev, 10);
  return elapsed >= DEBOUNCE_MS;
}

function markFetch() {
  var key = 'dp_last_fetch_' + (currentType || 'all');
  sessionStorage.setItem(key, String(Date.now()));
}

function timeAgo(t) {
  if (!t) return '';
  var s = Math.floor((Date.now() - t.getTime()) / 1000);
  if (s < 60) return s + '秒前';
  if (s < 3600) return Math.floor(s / 60) + '分钟前';
  return Math.floor(s / 3600) + '小时前';
}

/* ====== data ====== */
function fetchEvents(eventType) {
  var params = new URLSearchParams();
  params.set('limit', '200');
  if (eventType) params.set('event_type', eventType);
  return fetch(API + '?' + params).then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  }).then(function(body) {
    if (body.error) throw new Error(body.error);
    return body.data || [];
  });
}

/* ====== render ====== */
function renderEvents(events) {
  var list = document.getElementById('eventList');
  if (!events.length) {
    list.innerHTML = '<div class="empty">暂无事件。管线正在运行中，新事件将在公告发布后10分钟内出现。</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    var typeLabel = TYPE_NAMES[e.event_type] || e.event_type;
    var typeCss = TYPE_CSS[e.event_type] || '';
    var confLabel = CONF_NAMES[e.confidence_tier] || e.confidence_tier;
    var confCss = CONF_CSS[e.confidence_tier] || '';
    var date = e.announcement_date || '';
    var time = e.announcement_time || '';
    var timeMap = { pre_market: '盘前', midday: '盘中', after_market: '盘后', weekend: '周末' };
    var timeLabel = timeMap[time] || time;
    html += '<div class="event-card">' +
      '<div class="event-header">' +
        '<span class="event-stock">' + esc(e.stock_name || e.stock_code) + '<span class="code">' + esc(e.stock_code) + '</span></span>' +
        '<span class="badge badge-type ' + typeCss + '">' + typeLabel + '</span>' +
        '<span class="badge ' + confCss + '">' + confLabel + '</span>' +
      '</div>' +
      '<div class="event-summary">' + esc(e.ai_summary || '—') + '</div>' +
      '<div class="event-meta">' +
        '<span>' + date + '</span>' +
        (timeLabel ? '<span>' + timeLabel + '</span>' : '') +
        '<span>' + esc(PHASE_NAMES[e.phase] || e.phase || '') + '</span>' +
        (e.source_url ? ' · <a href="' + esc(e.source_url) + '" target="_blank" rel="noopener">查看原文 →</a>' : '') +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

function renderError(err) {
  document.getElementById('eventList').innerHTML =
    '<div class="error-msg">加载失败：' + esc(err.message) + '<br><small>数据管线可能正在重启，稍后自动重试...</small></div>';
}

function updateStatusBar(events) {
  var dot = document.getElementById('statusDot');
  var text = document.getElementById('statusText');
  var info = document.getElementById('refreshInfo');

  if (lastFetchTime) {
    var ts = lastFetchTime.toLocaleTimeString('zh-CN', { hour12: false });
    info.textContent = '数据时间: ' + ts + ' 北京时间 (' + timeAgo(lastFetchTime) + ') · 页面每5分钟自动刷新';
  }

  if (events !== null) {
    text.textContent = events.length + ' 条事件';
    dot.className = 'dot on';
  }
}

/* ====== load ====== */
function loadData(force) {
  force = force || false;

  // debounce check
  if (!force && !canFetch()) {
    if (cachedEvents !== null) {
      renderEvents(cachedEvents);
      updateStatusBar(cachedEvents);
    }
    console.log('Debounced: using cached data');
    return;
  }

  document.getElementById('statusDot').className = 'dot on';
  document.getElementById('statusText').textContent = '更新中...';

  fetchEvents(currentType).then(function(events) {
    renderEvents(events);
    cachedEvents = events;
    lastFetchTime = new Date();
    markFetch();
    updateStatusBar(events);

    // cache in sessionStorage for F5 resilience
    try {
      sessionStorage.setItem('dp_cached_events', JSON.stringify(events));
      sessionStorage.setItem('dp_cached_time', lastFetchTime.toISOString());
    } catch(e) { /* quota exceeded, ignore */ }
  }).catch(function(err) {
    // on error, try to use cached data
    if (cachedEvents !== null) {
      renderEvents(cachedEvents);
      updateStatusBar(cachedEvents);
    } else {
      renderError(err);
    }
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('statusText').textContent = '连接失败';
  });
}

/* ====== F5 resilience: restore from sessionStorage on rapid reload ====== */
function tryRestoreCache() {
  try {
    var cached = sessionStorage.getItem('dp_cached_events');
    var cachedTime = sessionStorage.getItem('dp_cached_time');
    if (cached && cachedTime) {
      var events = JSON.parse(cached);
      var t = new Date(cachedTime);
      var elapsed = Date.now() - t.getTime();
      if (elapsed < DEBOUNCE_MS) {
        // rapid reload: use cached data, skip API call
        renderEvents(events);
        cachedEvents = events;
        lastFetchTime = t;
        updateStatusBar(events);
        document.getElementById('statusText').textContent =
          (events.length || 0) + ' 条事件 (缓存)';
        return true;
      }
      // cache older than debounce window: still show it while fetching
      if (elapsed < REFRESH_MS) {
        renderEvents(events);
        cachedEvents = events;
        lastFetchTime = t;
        updateStatusBar(events);
      }
    }
  } catch(e) {}
  return false;
}

/* ====== filter ====== */
document.getElementById('filterBar').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  document.getElementById('filterBar').querySelectorAll('button').forEach(function(b) {
    b.className = (b === btn) ? '' : 'outline';
    if (b !== btn) { var t = b.dataset.type; if (t && TYPE_CSS[t]) b.classList.add(TYPE_CSS[t]); }
  });
  if (btn.dataset.type && TYPE_CSS[btn.dataset.type]) btn.classList.add(TYPE_CSS[btn.dataset.type]);
  currentType = btn.dataset.type || '';
  loadData(true);
});

/* ====== init ====== */
var allBtn = document.querySelector('#filterBar [data-type=""]');
if (allBtn) allBtn.className = '';

// try sessionStorage cache first (F5 resilience)
var restored = tryRestoreCache();

// always fetch fresh data (unless debounced)
loadData(!restored);

// auto-refresh every 5 minutes (always fetches fresh)
autoTimer = setInterval(function() { loadData(true); }, REFRESH_MS);

/* ====== dark mode ====== */
(function() {
  var KEY = 'dp_theme';
  var html = document.documentElement;
  var btn = document.getElementById('themeToggle');
  if (!btn) return;

  // prefer saved > system > light
  var saved = localStorage.getItem(KEY);
  if (saved) {
    html.setAttribute('data-theme', saved);
    btn.textContent = saved === 'dark' ? '☀️' : '🌙';
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }

  btn.addEventListener('click', function() {
    var cur = html.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(KEY, next);
  });
})();
</script>
</body>
</html>
